$kind: http-request
url: "{{baseUrl}}/agents"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "v0.0.3 Agent",
      "email": "agent_v003@test.com",
      "userId": "{{userId}}",
      "action": "create"
    }
scripts:
  - type: afterResponse
    code: var d=pm.response.json();if(d.id)pm.collectionVariables.set('agentId',d.id);pm.test('Created',!!d.id)
    language: text/javascript
order: 1000
