$kind: http-request
url: "{{baseUrl}}/payments/verify"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "paymentId": "00000000-0000-0000-0000-000000000000",
      "transactionId": "fake"
    }
scripts:
  - type: afterResponse
    code: pm.test('NOT_FOUND-3001',pm.response.json().code==='NOT_FOUND-3001')
    language: text/javascript
order: 3000
