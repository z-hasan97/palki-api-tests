$kind: http-request
url: "{{baseUrl}}/admin/blog/posts"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "title": "v0.0.3 Blog Post",
      "content": "Content for v0.0.3",
      "status": "PUBLISHED",
      "action": "create"
    }
scripts:
  - type: afterResponse
    code: var d=pm.response.json();if(d.slug)pm.collectionVariables.set('postSlug',d.slug);pm.test('Slug:'+d.slug,!!d.slug)
    language: text/javascript
order: 1000
