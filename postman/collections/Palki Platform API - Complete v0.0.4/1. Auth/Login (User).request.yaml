$kind: http-request
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: '{"identifier":"flowtest2@example.com","password":"Test1234","deviceId":"postman"}'
scripts:
  - type: afterResponse
    code: var d=pm.response.json();if(d.accessToken)pm.collectionVariables.set('token',d.accessToken);if(d.user)pm.collectionVariables.set('userId',d.user.id)
    language: text/javascript
order: 3000
