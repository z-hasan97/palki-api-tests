$kind: http-request
url: "{{baseUrl}}/matches/request"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "requesterId": "{{userId}}",
      "targetId": "14b5a018-239a-4e16-bb1f-3ff13ff790c9",
      "action": "request"
    }
scripts:
  - type: afterResponse
    code: var d=pm.response.json();if(d.id)pm.collectionVariables.set('matchId',d.id);pm.test('Match:'+d.status,!!d.id)
    language: text/javascript
order: 1000
