$kind: http-request
url: "{{baseUrl}}/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@palki.com",
      "password": "Test1234",
      "name": "Dup"
    }
scripts:
  - type: afterResponse
    code: pm.test('AUTH-1005',pm.response.json().code==='AUTH-1005')
    language: text/javascript
order: 1000
